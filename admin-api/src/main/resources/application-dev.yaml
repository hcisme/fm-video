spring:
  config:
    activate:
      on-profile: dev

  datasource:
    username: root
    password: emmmm000
    url: jdbc:mysql://127.0.0.1:3306/video?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&allowMultiQueries=true
